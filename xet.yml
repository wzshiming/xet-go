---
GENERATOR:
  PackageName: xet
  PackageDescription: >
    Package xet provides Go CGo bindings for the xet-core HuggingFace Xet
    storage library.  The low-level API mirrors the C interface defined in
    xet.h; for a more idiomatic Go experience use the high-level wrappers
    in the parent package.
  PackageLicense: >
    Copyright (c) wzshiming.  Licensed under the MIT License.
    Binding code generated by https://git.io/c-for-go.
  Includes: ["xet.h"]

PARSER:
  IncludePaths: ["xet"]
  SourcesPaths: ["xet/xet.h"]

TRANSLATOR:
  ConstRules:
    defines: eval
    enum:    cgo
  PtrTips:
    function:
      # xet_upload_files: file_paths (arr), endpoint (ref), token_info (ref),
      #                   sha256s (arr)
      - {target: "^xet_upload_files$",
         tips: [arr, 0, ref, ref, arr, 0, 0]}
      # xet_hash_files: file_paths (arr)
      - {target: "^xet_hash_files$",
         tips: [arr, 0]}
      # xet_download_files: files (arr), endpoint (ref), token_info (ref)
      - {target: "^xet_download_files$",
         tips: [arr, 0, ref, ref]}
      # xet_chunk_data: data (arr)
      - {target: "^xet_chunk_data$",
         tips: [arr, 0]}
      # xet_hash_chunk: data (arr)
      - {target: "^xet_hash_chunk$",
         tips: [arr, 0]}
      # xet_compute_xorb_hash: chunks (arr)
      - {target: "^xet_compute_xorb_hash$",
         tips: [arr, 0]}
      # default: treat every pointer as ref
      - {target: "(?i)^xet_", tips: [ref, ref, ref, ref, ref, ref, ref, ref]}
  Rules:
    global:
      - {transform: lower}
      - {action: accept, from: "^[Xx]et"}
      - {action: accept, from: "^xet_"}
      - {action: replace, from: "^xet_", to: _}
    type:
      - {action: replace, from: "_t$"}
    private:
      - {transform: unexport}
    post-global:
      - {action: replace, from: _$}
      - {transform: export}
      - {load: snakecase}
